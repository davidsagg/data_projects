services:

  # ── Dev container (VS Code anexa aqui) ─────────────────
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: trend-radar-dev
    volumes:
      - ..:/workspace:cached
    environment:
      PYTHONPATH: /workspace
      DUCKDB_PATH: /workspace/data/trend_radar.duckdb
      OLLAMA_URL: http://host.docker.internal:11434
      MLFLOW_TRACKING_URI: http://mlflow:5000
    env_file:
      - ../.env
    extra_hosts:
      - host.docker.internal:host-gateway
    command: sleep infinity
    networks: [trend-radar-net]

  # ── FastAPI ─────────────────────────────────────────────
  api:
    image: trend-radar-dev
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ['8000:8000']
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    environment:
      PYTHONPATH: /workspace
      DUCKDB_PATH: /workspace/data/trend_radar.duckdb
      OLLAMA_URL: http://host.docker.internal:11434
      MLFLOW_TRACKING_URI: http://mlflow:5000
    env_file:
      - ../.env
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - app
    networks: [trend-radar-net]

  # ── Streamlit ───────────────────────────────────────────
  dashboard:
    image: trend-radar-dev
    command: >
      streamlit run src/dashboard/app.py
      --server.port 8501 --server.address 0.0.0.0
      --server.headless true
    ports: ['8501:8501']
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    environment:
      PYTHONPATH: /workspace
      DUCKDB_PATH: /workspace/data/trend_radar.duckdb
      TREND_RADAR_API: http://api:8000
    env_file:
      - ../.env
    depends_on:
      api: {condition: service_healthy}
    networks: [trend-radar-net]

  # ── Airflow Init (roda uma vez) ──────────────────────────
  airflow-init:
    image: apache/airflow:2.9.1-python3.11
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
                 --firstname Trend --lastname Radar
                 --role Admin --email admin@trend-radar.local || true"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data/airflow:/opt/airflow/db
      - airflow-logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/db/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: trend-radar-secret-2026
      PYTHONPATH: /workspace
    env_file:
      - ../.env
    networks: [trend-radar-net]
    restart: "no"

  # ── Airflow Webserver ────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.1-python3.11
    command: webserver
    ports: ['8080:8080']
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data/airflow:/opt/airflow/db
      - airflow-logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/db/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: trend-radar-secret-2026
      PYTHONPATH: /workspace
    env_file:
      - ../.env
    depends_on:
      airflow-init: {condition: service_completed_successfully}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 60s
      timeout: 30s
      start_period: 120s
      retries: 5
    networks: [trend-radar-net]
    restart: unless-stopped

  # ── Airflow Scheduler ────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.1-python3.11
    command: scheduler
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data/airflow:/opt/airflow/db
      - airflow-logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/db/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: trend-radar-secret-2026
      PYTHONPATH: /workspace
    env_file:
      - ../.env
    depends_on:
      airflow-webserver: {condition: service_healthy}
    networks: [trend-radar-net]
    restart: unless-stopped

  # ── MLflow ──────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    command: >
      sh -c 'pip install mlflow -q &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri /mlruns
             --default-artifact-root /mlruns'
    ports: ['5001:5000']
    volumes:
      - ../data/mlruns:/mlruns
    networks: [trend-radar-net]
    restart: unless-stopped

networks:
  trend-radar-net:
    driver: bridge

volumes:
  airflow-logs:
